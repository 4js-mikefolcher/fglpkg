app = "fglpkg-registry"
primary_region = "lhr"

[build]

[[mounts]]
  source      = "registry_meta"
  destination = "/data"

[env]
  REGISTRY_DATA_DIR          = "/data"
  REGISTRY_BASE_URL          = "https://fglpkg-registry.fly.dev"
  REGISTRY_REQUIRE_READ_AUTH = "false"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1
  [http_service.concurrency]
    type       = "requests"
    soft_limit = 100
    hard_limit = 200

[[http_service.checks]]
  grace_period = "5s"
  interval     = "15s"
  method       = "GET"
  path         = "/health"
  protocol     = "http"
  timeout      = "5s"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
